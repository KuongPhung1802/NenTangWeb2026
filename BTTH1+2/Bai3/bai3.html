<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 3 - Table Nâng Cao</title>
<style>
    table {
        border-collapse: collapse;
        width: 90%;
        margin: 30px auto;
        text-align: center;
    }
    th, td {
        border: 1px solid black;
        padding: 8px;
    }
    th {
        background: #e6e6e6;
    }
</style>
</head>
<body>

<h2 style="text-align:center;">STUDENT EXAM TABLE</h2>

<table>
    <!-- Hàng 1 -->
    <tr>
        <th colspan="2">Student</th>
        <th colspan="4">Exam</th>
        <th colspan="4">2nd Exam</th>
        <th colspan="2">Final Grade</th>
    </tr>

    <!-- Hàng 2 -->
    <tr>
        <th rowspan="2">Code</th>
        <th rowspan="2">Name</th>

        <th>Q1</th>
        <th>Q2</th>
        <th>Q3</th>
        <th rowspan="2">Grade</th>

        <th>Q1</th>
        <th>Q2</th>
        <th>Q3</th>
        <th rowspan="2">Grade</th>

        <th rowspan="2">NR</th>
        <th rowspan="2">R</th>
    </tr>

    <!-- Hàng 3 -->
    <tr>
        <td>8</td>
        <td>7</td>
        <td>5</td>

        <td>6</td>
        <td>7</td>
        <td>8</td>
    </tr>

    <!-- Data -->
    <tr>
        <td>80549061</td>
        <td>John</td>
        <td>70%</td>
        <td>100%</td>
        <td>100%</td>
        <td>17.6</td>
        <td colspan="4"></td>
        <td>17.6</td>
        <td>18</td>
    </tr>

    <tr>
        <td>80549062</td>
        <td>Mary</td>
        <td>10%</td>
        <td>50%</td>
        <td>50%</td>
        <td>6.8</td>
        <td>100%</td>
        <td>100%</td>
        <td>50%</td>
        <td>16.5</td>
        <td>16.5</td>
        <td>17</td>
    </tr>

    <tr>
        <td>80549063</td>
        <td>Claire</td>
        <td colspan="4"></td>
        <td>50%</td>
        <td>50%</td>
        <td>50%</td>
        <td>10.0</td>
        <td>10.0</td>
        <td>10</td>
    </tr>

</table>

</body>
</html>
