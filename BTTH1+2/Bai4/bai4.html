<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài 4 - Form</title>
<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
    }
    .form-box {
        width: 600px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 5px gray;
    }
    h3 {
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    input, select, textarea {
        width: 100%;
        padding: 6px;
        margin-top: 3px;
    }
    .row {
        display: flex;
        gap: 10px;
    }
    .row div {
        flex: 1;
    }
    button {
        margin-top: 15px;
        padding: 10px;
    }
</style>
</head>

<body>

<div class="form-box">
<form>

<!-- BASIC INFO -->
<h3>Basic Info</h3>

<label>Employee ID</label>
<input type="text" value="9">

<label>Last Name</label>
<input type="text">

<label>First Name</label>
<input type="text">

<label>Gender</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<label>Title</label>
<input type="text">

<label>Birth Date</label>
<input type="date">

<label>Hire Date</label>
<input type="date">

<!-- CONTACT -->
<h3>Contact Info</h3>

<label>Email</label>
<input type="email">

<label>Address</label>
<input type="text">

<div class="row">
<div>
<label>City</label>
<input type="text">
</div>
<div>
<label>Region</label>
<input type="text">
</div>
</div>

<label>Country</label>
<select>
<option>Vietnam</option>
<option>USA</option>
<option>Japan</option>
</select>

<label>Phone</label>
<input type="text">

<!-- OPTIONAL -->
<h3>Optional Info</h3>

<label>Notes</label>
<textarea rows="4"></textarea>

<label>Preferred Shift</label>
<input type="radio" name="shift"> Regular
<input type="radio" name="shift"> Night

<label>
<input type="checkbox"> Active
</label>

<br>

<button type="submit">Submit</button>
<button type="reset">Cancel</button>

</form>
</div>

</body>
</html>
