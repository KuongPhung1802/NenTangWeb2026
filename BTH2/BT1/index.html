<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Get in touch with us by filling contact form below</h2>

    <form class="contact-form">

        <!-- Hàng 1 -->
        <div class="row">
            <input type="text" placeholder="* Enter your full name">
            <input type="email" placeholder="* Enter your email address">
        </div>

        <!-- Hàng 2 -->
        <div class="row">
            <input type="text" placeholder="Enter your subject">
        </div>

        <!-- Hàng 3 -->
        <div class="row">
            <textarea placeholder="* Your message here..."></textarea>
        </div>

        <!-- Hàng 4 -->
        <div class="row bottom">
            <button type="submit">Send message</button>
            <p>* Please fill all required form field, thanks!</p>
        </div>

    </form>
</div>

</body>
</html>
<head>
<meta charset="UTF-8">
<title>Flexbox Contact Form</title>

<style>
/* DÁN CSS VÀO ĐÂY */
* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

.container {
    width: 1000px;
    margin: 40px auto;
    padding: 40px 50px;
    border: 2px solid #000;
}

.contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.row {
    display: flex;
    gap: 25px;
}

.row:first-child input {
    flex: 1;
}

input, textarea {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #cfcfcf;
    font-size: 14px;
}

textarea {
    height: 260px;
    resize: none;
}

.bottom {
    justify-content: space-between;
    align-items: center;
}

button {
    background: #69b3e7;
    border: none;
    padding: 12px 30px;
    color: white;
    border-radius: 4px;
}

.bottom p {
    color: #666;
}
</style>
</head>
